{% extends "layout.html" %}

{% block title %}FastAPI Blog - Home{% endblock %}

{% block content %}
    {% for post in posts %}
    <article>
        <div class="post-header">
            <img class="avatar" src="{{ url_for('static', path='/img/default.jpg') }}" alt="{{ post.author }}">
            <div>
                <a class="post-author" href="#">{{ post.author }}</a>
                <span class="post-date">{{ post.date_posted }}</span>
            </div>
        </div>
        <h2 class="post-title"><a href="{{ url_for('post', post_id=post.id) }}">{{ post.title }}</a></h2>
        <p class="post-content">{{ post.content }}</p>
    </article>
    {% endfor %}
{% endblock %}
