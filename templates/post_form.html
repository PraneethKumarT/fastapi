{% extends "layout.html" %}

{% block title %}New Post{% endblock %}

{% block content %}
    <article>
        <h2 class="post-title">New Post</h2>
        <form id="post-form" class="post-form">
            <div class="form-group">
                <label for="author">Author</label>
                <select id="author" name="user_id" required>
                    {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }}</option>
                    {% else %}
                    <option value="" disabled selected>No users yet — create one via the API first</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" minlength="3" maxlength="100" required>
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" rows="8" minlength="3" maxlength="1000" required></textarea>
            </div>
            <p class="form-error" id="form-error" hidden></p>
            <button type="submit" class="btn btn-solid">Publish</button>
            <a class="back-link" href="{{ url_for('home') }}">Cancel</a>
        </form>
    </article>
{% endblock %}

{% block scripts %}
    <script src="{{ url_for('static', path='/js/main.js') }}"></script>
{% endblock %}
